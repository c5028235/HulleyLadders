<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" href="{% static 'assets/music.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hulley Ladders</title>
</head>

<body>
    <!-- Header -->
    <header>
        <h2>Hulley Ladders</h2>
        <nav><a href="#">Home</a></nav>


        {% if messages %}
        {% for message in messages %}
        <script>
            alert("{{ message }}");
        </script>
        {% endfor %}
        {% endif %}

    </header>

    <!-- Main Content -->
    <main>
        {% block content %}


        {% endblock %}
    </main>

    <!-- Footer -->

    <footer>
        <p> 2025 Django Music App | All Rights Reserved </p>
    </footer>
</body>

</html>
