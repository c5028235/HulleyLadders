{% extends 'base.html' %}


{% block content %}


<h2>Login</h2>


{% if messages %}
<div class="message-box">
    {% for msg in messages %}
    <p class="success-message">{{msg}}</p>
    {% endfor %}
</div>
{% endif %}
<form method="post">
    {% csrf_token %}

    {{form.as_p}}
    <button type="submit">Login</button>
    <a href="{% url 'register' %}">Create Account</a>
</form>
{% endblock %}
