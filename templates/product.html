{% extends 'base.html' %}

{% block content %}
<div class=" container mt-5">
  <div class="card mb-3">
    <div class="row g-0">
      <div class="col-md-4">
        <img src="{{product.image.url}}" class="img-fluid rounded-start" alt="{{product.slug}}">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h5 class="card-title mb-5">{{product.name}}</h5>
          <p class="card-text">{{product.description}}</p>
          <!-- <p class="card-text"><small class="text-body-secondary">Last updated 3 mins ago</small></p> -->
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
